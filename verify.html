<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeFilou2.0 Studio — Vérification</title>
<style>
  :root {
    --bg-dark: #0d0e12;
    --bg-card: #161822;
    --accent: #6366f1;
    --text-main: #f3f4f6;
    --text-muted: #9ca3af;
    --border: rgba(255, 255, 255, 0.05);
    --font-stack: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg-dark);
    color: var(--text-main);
    font-family: var(--font-stack);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .verify-box {
    text-align: center;
    padding: 2.5rem 2rem;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    max-width: 360px;
  }
  .logo {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    background: linear-gradient(45deg, #fff, var(--text-muted));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 1.25rem auto;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { color: var(--text-muted); font-size: 0.9rem; }
  #error-msg {
    display: none;
    color: #f87171;
    font-size: 0.85rem;
    margin-top: 1rem;
  }
  /* Le widget Turnstile lui-même (souvent invisible le temps du check) */
  #turnstile-widget { margin-top: 1.25rem; display: flex; justify-content: center; }
</style>
</head>
<body>

  <div class="verify-box">
    <div class="logo">LeFilou2.0 Studio</div>
    <div class="spinner" id="spinner"></div>
    <p id="status-text">Vérification en cours, merci de patienter...</p>
    <div id="turnstile-widget"></div>
    <p id="error-msg">La vérification a échoué. Veuillez réessayer.</p>
  </div>

  <!-- ⚠️ Remplace par TA sitekey Turnstile (Cloudflare dashboard > Turnstile) -->
  <script>
    const TURNSTILE_SITE_KEY = "0x4AAAAAADUWxdzr58kzE8lx";
  </script>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileLoad" async defer></script>
  <script>
    function onTurnstileLoad() {
      turnstile.render("#turnstile-widget", {
        sitekey: TURNSTILE_SITE_KEY,
        theme: "dark",
        // "auto" : Turnstile décide si un défi visible est nécessaire ou non.
        // La plupart des visiteurs légitimes ne verront rien d'affiché.
        appearance: "interaction-only",
        callback: async function (token) {
          await verifyAndEnter(token);
        },
        "error-callback": function () {
          showError();
        },
      });
    }

    async function verifyAndEnter(token) {
      try {
        const res = await fetch("/api/verify-turnstile", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token }),
        });

        if (res.ok) {
          // Le Worker a posé un cookie de session valide.
          // On recharge la page : le Worker servira désormais le vrai site.
          window.location.href = "/";
        } else {
          showError();
        }
      } catch (e) {
        showError();
      }
    }

    function showError() {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("status-text").style.display = "none";
      document.getElementById("error-msg").style.display = "block";
    }

    // Si Turnstile ne charge pas du tout après quelques secondes (bloqué, etc.)
    setTimeout(() => {
      if (typeof turnstile === "undefined") showError();
    }, 8000);
  </script>

</body>
</html>
